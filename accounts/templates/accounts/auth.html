{% load static tailwind_tags %}
<!DOCTYPE html>
<html>
<head>
  <title>Login / Register</title>
  {% tailwind_css %}
  <link rel="stylesheet" href="{% static 'mahipal/css/dist/styles.css' %}">
  <script>
function toggleForm(form) {
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");

    if (form === "login") {
        loginForm.style.display = "block";
        registerForm.style.display = "none";

        loginTab.classList.add("active-tab");
        registerTab.classList.remove("active-tab");
    } 
    else {
        loginForm.style.display = "none";
        registerForm.style.display = "block";

        registerTab.classList.add("active-tab");
        loginTab.classList.remove("active-tab");
    }
}
</script>
           
</head>
<style>
.active-tab {
    border-bottom: 2px solid blue;
    font-weight: bold;
}
#loginForm p {
      margin-bottom: 15px;
  }
</style>

<body onload="toggleForm('login')" class="bg-gray-100 flex justify-center items-center h-screen"
      style="
        background-image: url('{% static 'mahipal/images/img2.jpeg' %}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      ">
  <div class="bg-white p-8 rounded-xl shadow-xl w-96">
    <div class="tabs flex justify-center gap-6 mb-6">
    <button id="loginTab" onclick="toggleForm('login')">Login</button>
    <button id="registerTab" onclick="toggleForm('register')">Register</button>
    </div>


    {% if messages %}
      {% for message in messages %}
        <div class="text-green-600 mb-2">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <!-- LOGIN FORM -->
    <div id="loginForm" style="display:block;">
      <h2 class="text-xl font-bold mb-4 text-center">Login</h2>
      <form method="POST" action="{% url 'auth_page' %}">
        {% csrf_token %}
        {{ login_form.as_p }}
        <button type = "submit" name="login" class="bg-blue-500 hover:bg-blue-600 text-white w-full py-2 rounded mt-2">Login</button>
      </form>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" class="hidden">
  <h2 class="text-xl font-bold mb-4 text-center">Register</h2>

  <form method="POST" action="{% url 'auth_page' %}">
    {% csrf_token %}
    
    <label class="block font-semibold">Email:</label>
    <input type="email" name ="email" class="border w-full p-2 rounded" required>

    <button type="submit" name="send_otp"
            class="bg-green-500 hover:bg-green-600 text-white w-full py-2 rounded mt-3">
      Send OTP
    </button>
  </form>

</div>

  </div>
</body>
</html>
