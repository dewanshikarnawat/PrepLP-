<!DOCTYPE html>
<html>
<head>
    <title>PDF Viewer</title>

    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
        body { margin:0; display:flex; height:100vh; }
        #viewer { width:70%; overflow:auto; background:#f4f4f4; }
        canvas { display:block; margin:20px auto;border: 1px solid #000; }
        #aiPanel {width: 30%;padding: 15px;border-left: 3px solid #333;overflow-y: auto;}
        #aiPanel button {width: 100%;margin-bottom: 8px;}
        #aiOutput {margin-top: 10px;white-space: pre-wrap;}
        .ai-panel {
    background: white;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.12);
    /* max-width: 320px; */
}

.ai-panel h3 {
    margin-top: 0;
    margin-bottom: 16px;
    text-align: center;
    color: #2c3e50;
    font-size: 20px;
}

.ai-btn {
    width: 100%;
    padding: 10px 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    background: #4f46e5;
    color: white;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
}

.ai-btn:hover {
    background: #4338ca;
    transform: translateY(-2px);
}

.ai-panel hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 14px 0;
}

.ai-output {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    color: #374151;
    min-height: 90px;
    line-height: 1.5;
}

    </style>
</head>
<body>

<!-- PDF RENDER AREA -->
<div id="viewer"></div>

<!-- AI PANEL -->
<div id="aiPanel" class="ai-panel">
    <h3>🤖 AI Tools</h3>

    <button onclick="runAI('summary')" class="ai-btn">
        1. Summarize Content
    </button>

    <button onclick="runAI('exam')" class="ai-btn">
        2. Exam Questions
    </button>

    <button onclick="runAI('topics')" class="ai-btn">
        3. Important Topics
    </button>

    <hr>

    <div id="aiOutput" class="ai-output">
        Select an option to generate output.
    </div>
</div>



<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const pdfUrl = "/accounts/pdfjs/{{ note_id }}/file/";
const viewer = document.getElementById("viewer");

pdfjsLib.getDocument(pdfUrl).promise
.then(pdf => {
    console.log("PDF loaded, pages:", pdf.numPages);

    for (let i = 1; i <= pdf.numPages; i++) {
        pdf.getPage(i).then(page => {
            const viewport = page.getViewport({ scale: 1.3 });
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            viewer.appendChild(canvas);

            page.render({
                canvasContext: context,
                viewport: viewport
            });
        });
    }
})
.catch(err => {
    console.error("PDF.js error:", err);
});
function runAI(type) {
    document.getElementById("aiOutput").innerText = "Processing...";

    fetch(`/accounts/pdfjs/{{ note_id }}/ai/?type=${type}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("aiOutput").innerText = data.result;
    })
    .catch(err => {
        document.getElementById("aiOutput").innerText = "Error generating output";
    });
}
</script>


</body>
</html>
